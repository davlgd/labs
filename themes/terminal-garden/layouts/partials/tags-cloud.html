{{- $current := .current -}}
{{- $terms := site.Taxonomies.tags.ByCount -}}
<div class="tags-cloud reveal">
  {{- range $terms }}
  <a class="tag-token{{ if eq .Name $current }} active{{ end }}" href="{{ printf "/tags/%s/" (urlize .Name) | relURL }}">
    <span class="name">{{ lower .Name }}</span>
    <span class="count">{{ .Count }}</span>
  </a>
  {{- end }}
</div>
